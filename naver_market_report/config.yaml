name: "Naver Market Report"
version: "0.1.3"
slug: "naver_market_report"
description: "네이버 증권 시황 리포트를 매일 수집해 Home Assistant에서 볼 수 있는 HTML로 저장합니다."
url: "https://finance.naver.com/research/market_info_list.naver"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
map:
  - type: homeassistant_config
    read_only: false
    path: /config
options:
  openai_api_key: ""
  model: "gpt-5"
  schedule_time: "10:00"
  timezone: "Asia/Seoul"
  max_pages: 3
  output_subdir: "analysis"
  publish_public: true
  public_subdir: "www"
  run_on_start: true
  local_only: false
  skip_attachments: false
schema:
  openai_api_key: "str?"
  model: "str"
  schedule_time: "str"
  timezone: "str"
  max_pages: "int"
  output_subdir: "str"
  publish_public: "bool"
  public_subdir: "str"
  run_on_start: "bool"
  local_only: "bool"
  skip_attachments: "bool"
